<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ClickerX — Red Cookie</title>
<style>
  :root{
    --bg:#041018;
    --panel:#0d1620;
    --muted:#9aa4b2;
    --accent:#ff3b3b;
    --accent-2:#ff8b8b;
    --accent-dark:#b82a2a;
    --glass:rgba(255,255,255,0.03);
    --ok:#7cff7c;
    --locked:#3b3f46;
    --gold:#ffd86b;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;background:
    radial-gradient(1200px 600px at 10% 10%, rgba(255,59,59,0.04), transparent),
    linear-gradient(180deg,#021018,#00060a);color:#eaf2ff}
  .wrap{max-width:1200px;margin:22px auto;padding:20px}
  header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  h1{margin:0;font-size:20px;letter-spacing:0.6px}
  .stats{display:flex;gap:12px;align-items:center}
  .stat{background:linear-gradient(180deg,var(--glass),transparent);padding:10px 14px;border-radius:10px;color:var(--muted);font-size:13px;border:1px solid rgba(255,255,255,0.02)}
  .big{font-size:26px;color:#fff;font-weight:800}
  .layout{display:grid;grid-template-columns:480px 1fr;gap:16px}
  .panel{background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);padding:14px;border-radius:12px;border:1px solid rgba(255,255,255,0.03);box-shadow:0 10px 30px rgba(0,0,0,0.5)}
  #clickerArea{display:flex;flex-direction:column;align-items:center;gap:12px}
  /* cookie button */
  #bigBtn{
    width:320px;height:320px;border-radius:50%;background:
      radial-gradient(circle at 30% 30%, #ffdca8 0%, #f2b86b 40%, #d18b3a 100%);
    border:8px solid rgba(255,255,255,0.06);
    color:#2b1600;font-size:28px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;
    box-shadow:0 28px 70px rgba(0,0,0,0.35), inset 0 -12px 36px rgba(0,0,0,0.12);
    transition:transform .08s ease, box-shadow .12s ease;position:relative;overflow:hidden;
  }
  #bigBtn:active{transform:scale(0.98)}
  #bigBtn .chip{position:absolute;width:18px;height:12px;border-radius:3px;background:#6b3b1a;box-shadow:inset 0 -2px 0 rgba(0,0,0,0.2)}
  /* chips positions */
  #bigBtn .c1{left:22%;top:28%;transform:rotate(-12deg)}
  #bigBtn .c2{left:58%;top:22%;transform:rotate(18deg)}
  #bigBtn .c3{left:40%;top:56%;transform:rotate(-6deg)}
  #bigBtn .c4{left:68%;top:52%;transform:rotate(10deg)}
  /* pulse ring */
  #bigBtn::after{content:"";position:absolute;inset:-8px;border-radius:50%;box-shadow:0 0 0 0 rgba(255,200,120,0.06);animation:cookiePulse 2.6s infinite}
  @keyframes cookiePulse{0%{box-shadow:0 0 0 0 rgba(255,200,120,0.06)}70%{box-shadow:0 0 0 44px rgba(255,200,120,0)}100%{box-shadow:0 0 0 0 rgba(255,200,120,0)}}
  .mini{display:flex;gap:12px;align-items:center}
  .controls{display:flex;gap:8px;flex-wrap:wrap}
  .btn{background:var(--glass);border:1px solid rgba(255,255,255,0.03);padding:8px 10px;border-radius:8px;color:var(--muted);cursor:pointer}
  .btn.primary{background:linear-gradient(90deg,var(--accent),var(--accent-dark));color:#fff;font-weight:700}
  .shop{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;max-height:76vh;overflow:auto;padding-right:6px}
  .item{position:relative;background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,0.03);display:flex;flex-direction:column;gap:8px;transition:transform .12s, box-shadow .12s, opacity .12s}
  .item.locked{opacity:0.45;filter:grayscale(60%);background:linear-gradient(180deg,rgba(0,0,0,0.02),transparent);border-color:rgba(255,255,255,0.01)}
  .item.affordable{box-shadow:0 10px 30px rgba(124,255,124,0.06);border-color:rgba(124,255,124,0.06)}
  .row{display:flex;justify-content:space-between;align-items:center}
  .name{font-weight:800;color:#fff}
  .desc{color:var(--muted);font-size:13px}
  .cost{color:var(--muted);font-size:13px}
  .count{color:var(--accent);font-weight:800}
  .count-bump{animation:bump .36s ease}
  @keyframes bump{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
  .flair-sparkle::before{content:"";position:absolute;left:10px;top:8px;font-size:12px;color:rgba(255,255,255,0.06)}
  /* animations for item types */
  .anim-gear .anim-el{width:28px;height:28px;border-radius:4px;background:linear-gradient(180deg,#cfcfcf,#9b9b9b);margin-left:auto;animation:spin 3s linear infinite}
  @keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
  .anim-flame .anim-el{width:28px;height:28px;margin-left:auto;background:linear-gradient(180deg,#ffb86b,#ff6b3b);border-radius:6px;animation:flame 1.2s infinite}
  @keyframes flame{0%{transform:translateY(0) scaleY(1)}50%{transform:translateY(-6px) scaleY(1.08)}100%{transform:translateY(0) scaleY(1)}}
  .anim-orb .anim-el{width:28px;height:28px;margin-left:auto;border-radius:50%;background:radial-gradient(circle,#9be6ff,#3b9cff);box-shadow:0 6px 18px rgba(59,156,255,0.12);animation:orb 2.4s infinite}
  @keyframes orb{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
  .anim-spark .anim-el{width:28px;height:28px;margin-left:auto;background:linear-gradient(90deg,#fff,#ffd86b);border-radius:6px;animation:spark 1.6s infinite}
  @keyframes spark{0%{transform:translateY(0) rotate(0)}50%{transform:translateY(-6px) rotate(12deg)}100%{transform:translateY(0) rotate(0)}}
  .golden{position:fixed;left:50%;transform:translateX(-50%);top:-80px;width:64px;height:64px;border-radius:12px;background:linear-gradient(180deg,#fff0b8,#ffd86b);box-shadow:0 12px 30px rgba(255,200,80,0.25);display:flex;align-items:center;justify-content:center;font-weight:800;color:#6b3b00;cursor:pointer;z-index:9999;animation:fall 6s linear forwards}
  @keyframes fall{0%{top:-120px;opacity:0}10%{opacity:1}90%{top:110vh;opacity:1}100%{top:110vh;opacity:0}}
  .golden .shine{position:absolute;inset:0;border-radius:12px;box-shadow:inset 0 10px 30px rgba(255,255,255,0.25);opacity:0.6}
  .mult-banner{position:fixed;left:50%;transform:translateX(-50%);top:18px;background:linear-gradient(90deg,#ffd86b,#ffb86b);padding:10px 18px;border-radius:10px;color:#3b1a00;font-weight:800;box-shadow:0 8px 30px rgba(0,0,0,0.4);z-index:10000;display:none}
  .mult-active{display:block}
  .small-muted{font-size:13px;color:var(--muted)}
  footer{margin-top:14px;text-align:center;color:var(--muted);font-size:13px}
  @media (max-width:980px){ .layout{grid-template-columns:1fr} #bigBtn{width:220px;height:220px} .shop{max-height:48vh} }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>ClickerX — Red Cookie</h1>
      <div class="stats">
        <div class="stat">Gesamt: <div id="totalDisplay" class="big">0.00</div></div>
        <div class="stat">CPS: <div id="cpsDisplay" class="big">0.00</div></div>
      </div>
    </header>

    <div class="layout">
      <div class="panel" id="clickerPanel">
        <div id="clickerArea">
          <button id="bigBtn" aria-label="Großer Cookie">
            <span style="font-size:18px">🍪</span>
            <div class="chip c1"></div><div class="chip c2"></div><div class="chip c3"></div><div class="chip c4"></div>
          </button>

          <div class="mini" style="width:100%;justify-content:space-between">
            <div class="stat">Cookies: <div id="cookieDisplay" class="big">0.00</div></div>
            <div style="display:flex;flex-direction:column;align-items:flex-end">
              <div class="small-muted">Pro Klick: <strong id="perClick">1</strong></div>
              <div class="small-muted">Bonus CPS: <strong id="bonus">0</strong></div>
            </div>
          </div>

          <div class="controls" style="width:100%;justify-content:space-between">
            <div style="display:flex;gap:8px">
              <button class="btn" id="saveBtn">Speichern</button>
              <button class="btn" id="loadBtn">Laden</button>
              <button class="btn" id="resetBtn">Reset</button>
            </div>
            <div>
              <button class="btn primary" id="buyMaxBtn">Buy Max</button>
            </div>
          </div>

          <div style="width:100%;margin-top:8px">
            <div class="hint">Goldene Kekse regnen jede Minute. Klick sie für einen zufälligen Cookie‑Multiplikator (1–100) für 20s.</div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="display:flex;gap:8px;align-items:center">
            <div class="small-muted">Shop</div>
            <div class="small-muted" id="ownedSummary"></div>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <input id="filter" type="search" placeholder="Suche Addon (Name oder #)" style="padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.03);background:transparent;color:#fff" />
            <button class="btn" id="sortBtn">Sort: Preis</button>
          </div>
        </div>

        <div id="shop" class="shop"></div>
      </div>
    </div>

    <footer>
      <div class="small-muted">Hotkeys: Leertaste = Klick, M = Buy Max, S = Save, L = Load, R = Reset</div>
    </footer>
  </div>

  <div id="multBanner" class="mult-banner">x<span id="multVal">1</span> Cookie‑Boost aktiv!</div>

<script>
/* ClickerX — polished with per-item animations, golden cookie rain, random multiplier.
   Single-file. Save as index.html and open in browser.
*/

const SAVE_KEY = 'clickerx_polished_gold_v2';
const SHOP_COUNT = 100;
let state = {
  total: 0,
  cookies: 0,
  perClick: 1,
  bonus: 0,
  cps: 0,
  items: [],
  lastTick: Date.now()
};

// multiplier state
let goldenActive = false;
let goldenMultiplier = 1;
let goldenTimeout = null;

// formatting
function fmtShort(n){
  if(n >= 1e12) return (n/1e12).toFixed(2)+'T';
  if(n >= 1e9) return (n/1e9).toFixed(2)+'B';
  if(n >= 1e6) return (n/1e6).toFixed(2)+'M';
  if(n >= 1e3) return (n/1e3).toFixed(2)+'k';
  return Math.floor(n).toString();
}
function fmtDisplay(n){
  if(n < 1000) return Number(n).toFixed(2);
  return fmtShort(n);
}

// creative names
const CREATIVE_NAMES = [
  "AutoClicker Mk I","Cookie Drone","Sugar Synthesizer","Quantum Oven","Dragon's Breath",
  "Neon Mixer","Pixel Baker","Time‑Warp Kettle","Lucky Spoon","Grandma's Secret",
  "Factory Bot","Holo‑Advertiser","Cloud Mixer","Magnet Glove","Turbo Whisk",
  "Orbital Oven","Echo Harvester","Flux Conveyor","Crystal Jar","Starlight Press",
  "Pocket Blackhole","Candy Forge","Dream Mill","Aurora Tray","Zen Garden"
];

// generate shop with special flags and animation types
function genShop(){
  const items = [];
  for(let i=1;i<=SHOP_COUNT;i++){
    const name = CREATIVE_NAMES[i-1] || `Addon #${i}`;
    const base = Math.max(5, Math.round(Math.pow(1.17, i) * (8 + i*4)));
    const cps = parseFloat((Math.pow(1.07, i) * (0.05 + i*0.04)).toFixed(3));
    const special = {};
    if(i === 1) special.autoClickRatePerCount = 0.5; // auto-clicks per second per unit
    if(i === 5) special.bonusPerCount = 0.02;
    // assign animation type by pattern
    let anim = 'anim-spark';
    if(i % 7 === 0) anim = 'anim-gear';
    if(i % 5 === 0) anim = 'anim-flame';
    if(i % 3 === 0) anim = 'anim-orb';
    const flair = (i % 6 === 0);
    items.push({ id:i, name, baseCost: base, cost: base, cps, count:0, special, anim, flair });
  }
  return items;
}

// UI render
function renderShop(filter='', sortBy='cost'){
  const shop = document.getElementById('shop');
  shop.innerHTML = '';
  let list = state.items.slice();

  if(filter){
    const f = filter.toLowerCase();
    list = list.filter(it => it.name.toLowerCase().includes(f) || String(it.id).includes(f));
  }

  if(sortBy === 'cost') list.sort((a,b)=>a.cost-b.cost);
  if(sortBy === 'cps') list.sort((a,b)=>b.cps-a.cps);
  if(sortBy === 'id') list.sort((a,b)=>a.id-b.id);

  for(const it of list){
    const div = document.createElement('div');
    const affordable = state.cookies >= it.cost;
    div.className = 'item ' + (affordable ? 'affordable' : 'locked');
    // description
    let desc = '';
    if(it.special && it.special.autoClickRatePerCount){
      desc = `Auto‑clicks: +${it.special.autoClickRatePerCount}/s per unit`;
    } else if(it.special && it.special.bonusPerCount){
      desc = `Passive bonus: +${it.special.bonusPerCount} CPS per unit`;
    } else {
      desc = `Generates ${it.cps} CPS each`;
    }
    // animation element
    const animHtml = `<div class="anim-el" style="margin-left:auto"></div>`;
    const flairHtml = it.flair ? `<div style="position:absolute;right:10px;top:8px;color:rgba(255,255,255,0.06);font-size:12px">✦</div>` : '';
    div.innerHTML = `
      ${flairHtml}
      <div class="row"><div class="name">${it.name}</div><div class="count" data-id="${it.id}">x${it.count}</div></div>
      <div class="desc">${desc}</div>
      <div class="row"><div class="cost">CPS: ${it.cps}</div><div class="cost">Preis: ${fmtDisplay(it.cost)}</div></div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn buyBtn" data-id="${it.id}" ${affordable ? '' : 'disabled'}>Kaufen</button>
        <button class="btn" data-id="${it.id}" data-action="max" ${affordable ? '' : 'disabled'}>Max</button>
      </div>
      ${animHtml}
    `;
    // add animation class
    div.classList.add(it.anim);
    shop.appendChild(div);
  }
}

// update UI
function updateUI(){
  document.getElementById('totalDisplay').textContent = fmtDisplay(state.total);
  document.getElementById('cpsDisplay').textContent = state.cps.toFixed(2);
  document.getElementById('cookieDisplay').textContent = fmtDisplay(state.cookies);
  document.getElementById('perClick').textContent = state.perClick;
  document.getElementById('bonus').textContent = state.bonus;
  document.getElementById('ownedSummary').textContent = `Addons: ${state.items.reduce((s,i)=>s+i.count,0)}`;

  // update visible items and affordability classes
  document.querySelectorAll('#shop .item').forEach(el=>{
    const countEl = el.querySelector('.count');
    if(!countEl) return;
    const id = parseInt(countEl.dataset.id);
    const it = state.items.find(x=>x.id===id);
    if(!it) return;
    countEl.textContent = `x${it.count}`;
    const costEls = el.querySelectorAll('.cost');
    if(costEls.length >= 2) costEls[1].textContent = `Preis: ${fmtDisplay(it.cost)}`;
    const affordable = state.cookies >= it.cost;
    if(affordable){
      el.classList.remove('locked');
      el.classList.add('affordable');
      el.querySelectorAll('button').forEach(b=>b.disabled = false);
    } else {
      el.classList.add('locked');
      el.classList.remove('affordable');
      el.querySelectorAll('button').forEach(b=>b.disabled = true);
    }
  });
}

// game logic
function recalcCPS(){
  let base = state.items.reduce((s,it)=>s + it.cps * it.count, 0);
  for(const it of state.items){
    if(it.special && it.special.bonusPerCount){
      base += it.count * it.special.bonusPerCount;
    }
  }
  state.cps = base + state.bonus;
}

// auto-click contribution (special item 1)
function autoClickContribution(dt){
  const it = state.items.find(x=>x.special && x.special.autoClickRatePerCount);
  if(!it) return 0;
  const rate = it.count * (it.special.autoClickRatePerCount || 0); // clicks per second
  // auto-clicks produce perClick each; apply golden multiplier to perClick via current perClick value
  return rate * state.perClick * dt;
}

function tick(){
  const now = Date.now();
  const dt = (now - state.lastTick) / 1000;
  if(dt > 0){
    const gain = state.cps * dt;
    const autoClickGain = autoClickContribution(dt);
    state.cookies += gain + autoClickGain;
    state.total += gain + autoClickGain;
    state.lastTick = now;
  }
  updateUI();
  requestAnimationFrame(tick);
}

// click handling
function doClick(){
  const gain = state.perClick;
  state.cookies += gain;
  state.total += gain;

  // button animation + floating text
  const bigBtn = document.getElementById('bigBtn');
  bigBtn.animate([{transform:'scale(1)'},{transform:'scale(1.06)'},{transform:'scale(1)'}],{duration:140,easing:'cubic-bezier(.2,.8,.2,1)'});

  const flash = document.createElement('div');
  flash.textContent = `+${gain * (goldenActive ? goldenMultiplier : 1)}`;
  flash.style.position = 'absolute';
  flash.style.top = '12%';
  flash.style.left = '50%';
  flash.style.transform = 'translateX(-50%)';
  flash.style.color = '#6b3b1a';
  flash.style.fontWeight = '900';
  flash.style.pointerEvents = 'none';
  flash.style.textShadow = '0 2px 8px rgba(0,0,0,0.6)';
  flash.style.fontSize = '18px';
  bigBtn.appendChild(flash);
  flash.animate([{opacity:1, transform:'translateY(0)'},{opacity:0, transform:'translateY(-48px)'}],{duration:700}).onfinish = ()=> flash.remove();

  updateUI();
}

// buying
function buyItem(id, qty=1){
  const it = state.items.find(x=>x.id===id);
  if(!it) return;
  let bought = 0;
  for(let i=0;i<qty;i++){
    if(state.cookies >= it.cost){
      state.cookies -= it.cost;
      it.count++;
      it.cost = Math.ceil(it.baseCost * Math.pow(1.15, it.count));
      bought++;
    } else break;
  }
  if(bought>0){
    recalcCPS();
    // bump animation
    const countEl = document.querySelector(`#shop .count[data-id="${id}"]`);
    if(countEl){
      countEl.classList.remove('count-bump');
      void countEl.offsetWidth;
      countEl.classList.add('count-bump');
    }
    updateUI();
  }
}

function buyMax(id){
  const it = state.items.find(x=>x.id===id);
  if(!it) return;
  let bought = 0;
  while(state.cookies >= it.cost){
    state.cookies -= it.cost;
    it.count++;
    it.cost = Math.ceil(it.baseCost * Math.pow(1.15, it.count));
    bought++;
    if(bought > 100000) break;
  }
  if(bought>0){ recalcCPS(); updateUI(); }
}

function buyMaxAll(){
  const sorted = state.items.slice().sort((a,b)=>a.cost-b.cost);
  let totalBought = 0;
  for(const it of sorted){
    while(state.cookies >= it.cost){
      state.cookies -= it.cost;
      it.count++;
      it.cost = Math.ceil(it.baseCost * Math.pow(1.15, it.count));
      totalBought++;
      if(totalBought > 100000) break;
    }
  }
  if(totalBought>0){ recalcCPS(); updateUI(); }
}

// golden cookie: spawn every 60s
function spawnGolden(){
  const el = document.createElement('div');
  el.className = 'golden';
  el.innerHTML = `<div class="shine"></div>🍪`;
  document.body.appendChild(el);
  // remove after animation ends (6s)
  setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); }, 6200);
  el.addEventListener('click', ()=>{
    // apply random multiplier 1..100 for 20s
    const mult = Math.floor(Math.random()*100) + 1;
    activateGolden(mult);
    // pop effect
    el.style.transform = 'translateX(-50%) scale(1.2)';
    el.style.opacity = '0';
    setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); }, 300);
  });
}

// activate golden multiplier
function activateGolden(mult){
  if(goldenTimeout) clearTimeout(goldenTimeout);
  goldenActive = true;
  goldenMultiplier = mult;
  // apply multiplier to perClick visually by multiplying displayed perClick (we keep base perClick in state.perClickBase if needed)
  // We'll temporarily multiply state.perClick for 20s
  state.perClick = state.perClick * mult;
  document.getElementById('multVal').textContent = mult;
  document.getElementById('multBanner').classList.add('mult-active');
  goldenTimeout = setTimeout(()=>{ deactivateGolden(); }, 20000);
}

// deactivate golden
function deactivateGolden(){
  if(!goldenActive) return;
  // revert perClick by dividing by multiplier
  state.perClick = state.perClick / goldenMultiplier;
  goldenActive = false;
  goldenMultiplier = 1;
  document.getElementById('multBanner').classList.remove('mult-active');
  goldenTimeout = null;
  updateUI();
}

// save/load/reset
function saveGame(){
  const data = {
    total: state.total,
    cookies: state.cookies,
    perClick: state.perClick,
    bonus: state.bonus,
    items: state.items.map(it=>({id:it.id,count:it.count,cost:it.cost}))
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(data));
}

function loadGame(){
  const raw = localStorage.getItem(SAVE_KEY);
  if(!raw) return;
  try{
    const data = JSON.parse(raw);
    state.total = data.total || 0;
    state.cookies = data.cookies || 0;
    state.perClick = data.perClick || 1;
    state.bonus = data.bonus || 0;
    for(const s of data.items || []){
      const it = state.items.find(x=>x.id===s.id);
      if(it){ it.count = s.count || 0; it.cost = s.cost || it.cost; }
    }
    recalcCPS();
    renderShop();
    updateUI();
  }catch(e){ /* ignore corrupt save */ }
}

function resetGame(){
  if(!confirm('Reset? Alle Fortschritte gehen verloren.')) return;
  state = { total:0, cookies:0, perClick:1, bonus:0, cps:0, items:[], lastTick:Date.now() };
  state.items = genShop();
  recalcCPS();
  renderShop();
  updateUI();
  localStorage.removeItem(SAVE_KEY);
}

// init & hooks
let currentSort = 'cost';
function init(){
  state.items = genShop();

  // try load
  const raw = localStorage.getItem(SAVE_KEY);
  if(raw){
    try{
      const parsed = JSON.parse(raw);
      state.total = parsed.total || 0;
      state.cookies = parsed.cookies || 0;
      state.perClick = parsed.perClick || 1;
      state.bonus = parsed.bonus || 0;
      for(const s of parsed.items || []){
        const it = state.items.find(x=>x.id===s.id);
        if(it){ it.count = s.count || 0; it.cost = s.cost || it.cost; }
      }
    }catch(e){ /* ignore */ }
  }

  recalcCPS();
  renderShop();
  updateUI();

  document.getElementById('bigBtn').addEventListener('click', doClick);
  document.getElementById('saveBtn').addEventListener('click', saveGame);
  document.getElementById('loadBtn').addEventListener('click', loadGame);
  document.getElementById('resetBtn').addEventListener('click', resetGame);
  document.getElementById('buyMaxBtn').addEventListener('click', buyMaxAll);

  document.getElementById('filter').addEventListener('input', (e)=> renderShop(e.target.value, currentSort));
  document.getElementById('sortBtn').addEventListener('click', ()=>{
    if(currentSort === 'cost') currentSort = 'cps';
    else if(currentSort === 'cps') currentSort = 'id';
    else currentSort = 'cost';
    document.getElementById('sortBtn').textContent = 'Sort: ' + (currentSort === 'cost' ? 'Preis' : currentSort === 'cps' ? 'CPS' : 'ID');
    renderShop(document.getElementById('filter').value, currentSort);
  });

  // delegated shop clicks
  document.getElementById('shop').addEventListener('click', (e)=>{
    const buy = e.target.closest('.buyBtn');
    if(buy){ buyItem(parseInt(buy.dataset.id)); recalcCPS(); return; }
    const max = e.target.closest('button[data-action="max"]');
    if(max){ buyMax(parseInt(max.dataset.id)); recalcCPS(); return; }
  });

  // keyboard shortcuts
  addEventListener('keydown', (e)=>{
    if(e.code === 'Space'){ e.preventDefault(); doClick(); }
    if(e.key.toLowerCase() === 'm') buyMaxAll();
    if(e.key.toLowerCase() === 's') saveGame();
    if(e.key.toLowerCase() === 'l') loadGame();
    if(e.key.toLowerCase() === 'r') resetGame();
  });

  state.lastTick = Date.now();
  requestAnimationFrame(tick);
  setInterval(saveGame, 10000);

  // golden cookie every 60s, spawn first after 10s
  setTimeout(()=>{ spawnGolden(); setInterval(spawnGolden, 60000); }, 10000);
}

// start
init();
</script>
</body>
</html>
