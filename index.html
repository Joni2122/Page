<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ClickerX — Red Button Pro (Polished)</title>
<style>
  :root{
    --bg:#041018;
    --panel:#0d1620;
    --muted:#9aa4b2;
    --accent:#ff3b3b;
    --accent-2:#ff8b8b;
    --accent-dark:#b82a2a;
    --glass:rgba(255,255,255,0.03);
    --ok:#7cff7c;
    --locked:#3b3f46;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;background:
    radial-gradient(1200px 600px at 10% 10%, rgba(255,59,59,0.04), transparent),
    linear-gradient(180deg,#021018,#00060a);color:#eaf2ff}
  .wrap{max-width:1200px;margin:22px auto;padding:20px}
  header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  h1{margin:0;font-size:20px;letter-spacing:0.6px}
  .stats{display:flex;gap:12px;align-items:center}
  .stat{background:linear-gradient(180deg,var(--glass),transparent);padding:10px 14px;border-radius:10px;color:var(--muted);font-size:13px;border:1px solid rgba(255,255,255,0.02)}
  .big{font-size:26px;color:#fff;font-weight:800}
  .layout{display:grid;grid-template-columns:460px 1fr;gap:16px}
  .panel{background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);padding:14px;border-radius:12px;border:1px solid rgba(255,255,255,0.03);box-shadow:0 10px 30px rgba(0,0,0,0.5)}
  #clickerArea{display:flex;flex-direction:column;align-items:center;gap:12px}
  /* Red big button */
  #bigBtn{
    width:320px;height:320px;border-radius:50%;background:radial-gradient(circle at 30% 30%, #ff8b8b, var(--accent));border:8px solid rgba(255,255,255,0.06);
    color:#fff;font-size:30px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;
    box-shadow:0 28px 70px rgba(255,59,59,0.18), inset 0 -12px 36px rgba(0,0,0,0.28);
    transition:transform .08s ease, box-shadow .12s ease;position:relative;overflow:hidden;
  }
  #bigBtn:active{transform:scale(0.98)}
  #bigBtn::after{content:"";position:absolute;inset:-8px;border-radius:50%;box-shadow:0 0 0 0 rgba(255,59,59,0.18);animation:pulse 2.2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,59,59,0.18)}70%{box-shadow:0 0 0 44px rgba(255,59,59,0)}100%{box-shadow:0 0 0 0 rgba(255,59,59,0)}}
  .mini{display:flex;gap:12px;align-items:center}
  .controls{display:flex;gap:8px;flex-wrap:wrap}
  .btn{background:var(--glass);border:1px solid rgba(255,255,255,0.03);padding:8px 10px;border-radius:8px;color:var(--muted);cursor:pointer}
  .btn.primary{background:linear-gradient(90deg,var(--accent),var(--accent-dark));color:#fff;font-weight:700}
  .shop{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;max-height:76vh;overflow:auto;padding-right:6px}
  .item{background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,0.03);display:flex;flex-direction:column;gap:8px;transition:transform .12s, box-shadow .12s}
  .item:hover{transform:translateY(-6px);box-shadow:0 10px 30px rgba(0,0,0,0.45)}
  .row{display:flex;justify-content:space-between;align-items:center}
  .name{font-weight:800;color:#fff}
  .desc{color:var(--muted);font-size:13px}
  .cost{color:var(--muted);font-size:13px}
  .count{color:var(--accent);font-weight:800}
  .locked{opacity:0.45;filter:grayscale(60%);background:linear-gradient(180deg,rgba(0,0,0,0.02),transparent);border-color:rgba(255,255,255,0.01)}
  .affordable{animation:glow 1.6s infinite}
  @keyframes glow{0%{box-shadow:0 0 0 0 rgba(124,255,124,0.0)}50%{box-shadow:0 0 18px 6px rgba(124,255,124,0.06)}100%{box-shadow:0 0 0 0 rgba(124,255,124,0.0)}}
  .count-bump{animation:bump .36s ease}
  @keyframes bump{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
  .small-muted{font-size:13px;color:var(--muted)}
  .hint{font-size:13px;color:var(--muted);margin-top:8px}
  footer{margin-top:14px;text-align:center;color:var(--muted);font-size:13px}
  @media (max-width:980px){ .layout{grid-template-columns:1fr} #bigBtn{width:220px;height:220px} .shop{max-height:48vh} }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>ClickerX — Red Button Pro</h1>
      <div class="stats">
        <div class="stat">Gesamt: <div id="totalDisplay" class="big">0.00</div></div>
        <div class="stat">CPS: <div id="cpsDisplay" class="big">0.00</div></div>
      </div>
    </header>

    <div class="layout">
      <div class="panel" id="clickerPanel">
        <div id="clickerArea">
          <button id="bigBtn" aria-label="Großer roter Klickknopf">KLICK</button>

          <div class="mini" style="width:100%;justify-content:space-between">
            <div class="stat">Cookies: <div id="cookieDisplay" class="big">0.00</div></div>
            <div style="display:flex;flex-direction:column;align-items:flex-end">
              <div class="small-muted">Pro Klick: <strong id="perClick">1</strong></div>
              <div class="small-muted">Bonus CPS: <strong id="bonus">0</strong></div>
            </div>
          </div>

          <div class="controls" style="width:100%;justify-content:space-between">
            <div style="display:flex;gap:8px">
              <button class="btn" id="saveBtn">Speichern</button>
              <button class="btn" id="loadBtn">Laden</button>
              <button class="btn" id="resetBtn">Reset</button>
            </div>
            <div>
              <button class="btn primary" id="buyMaxBtn">Buy Max</button>
            </div>
          </div>

          <div style="width:100%;margin-top:8px">
            <div class="hint">Shop: graue Addons sind gesperrt, leuchten wenn du sie dir leisten kannst. Kreative Addons haben eigene Effekte.</div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="display:flex;gap:8px;align-items:center">
            <div class="small-muted">Shop</div>
            <div class="small-muted" id="ownedSummary"></div>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <input id="filter" type="search" placeholder="Suche Addon (Name oder #)" style="padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.03);background:transparent;color:#fff" />
            <button class="btn" id="sortBtn">Sort: Preis</button>
          </div>
        </div>

        <div id="shop" class="shop"></div>
      </div>
    </div>

    <footer>
      <div class="small-muted">Hotkeys: Leertaste = Klick, M = Buy Max, S = Save, L = Load, R = Reset</div>
    </footer>
  </div>

<script>
/* Single-file ClickerX — polished:
   - logs removed
   - shop items greyed until affordable, glow when affordable
   - creative addon names + animations
   - special "AutoClicker" addon gives auto-click effect (adds perClick * rate)
   - all in one HTML, no external deps
*/

const SAVE_KEY = 'clickerx_polished_v1';
const SHOP_COUNT = 100;

let state = {
  total: 0,
  cookies: 0,
  perClick: 1,
  bonus: 0,
  cps: 0,
  items: [],
  lastTick: Date.now()
};

// formatting
function fmtShort(n){
  if(n >= 1e12) return (n/1e12).toFixed(2)+'T';
  if(n >= 1e9) return (n/1e9).toFixed(2)+'B';
  if(n >= 1e6) return (n/1e6).toFixed(2)+'M';
  if(n >= 1e3) return (n/1e3).toFixed(2)+'k';
  return Math.floor(n).toString();
}
function fmtDisplay(n){
  if(n < 1000) return Number(n).toFixed(2);
  return fmtShort(n);
}

// no-op logger (logs removed per request)
function log(){ /* intentionally empty */ }

// creative names for first 25 items
const CREATIVE_NAMES = [
  "AutoClicker Mk I",
  "Cookie Drone",
  "Sugar Synthesizer",
  "Quantum Oven",
  "Dragon's Breath (toy)",
  "Neon Mixer",
  "Pixel Baker",
  "Time-Warp Kettle",
  "Lucky Spoon",
  "Grandma's Secret",
  "Factory Bot",
  "Holo-Advertiser",
  "Cloud Mixer",
  "Magnet Glove",
  "Turbo Whisk",
  "Orbital Oven",
  "Echo Harvester",
  "Flux Conveyor",
  "Crystal Jar",
  "Starlight Press",
  "Pocket Blackhole",
  "Candy Forge",
  "Dream Mill",
  "Aurora Tray",
  "Zen Garden"
];

// generate shop with some special behaviors
function genShop(){
  const items = [];
  for(let i=1;i<=SHOP_COUNT;i++){
    const name = CREATIVE_NAMES[i-1] || `Addon #${i}`;
    // base cost scaling
    const base = Math.max(5, Math.round(Math.pow(1.17, i) * (8 + i*4)));
    // cps scaling
    const cps = parseFloat((Math.pow(1.07, i) * (0.05 + i*0.04)).toFixed(3));
    // special: item 1 (AutoClicker Mk I) gives autoClickRatePerCount
    const special = {};
    if(i === 1) special.autoClickRatePerCount = 0.5; // clicks per second per count
    if(i === 5) special.bonusPerCount = 0.02; // tiny bonus to cps per count
    // some items have small sparkle animation flag
    const flair = (i % 7 === 0);
    items.push({ id:i, name, baseCost: base, cost: base, cps, count:0, special, flair });
  }
  return items;
}

// UI render
function renderShop(filter='', sortBy='cost'){
  const shop = document.getElementById('shop');
  shop.innerHTML = '';
  let list = state.items.slice();

  if(filter){
    const f = filter.toLowerCase();
    list = list.filter(it => it.name.toLowerCase().includes(f) || String(it.id).includes(f));
  }

  if(sortBy === 'cost') list.sort((a,b)=>a.cost-b.cost);
  if(sortBy === 'cps') list.sort((a,b)=>b.cps-a.cps);
  if(sortBy === 'id') list.sort((a,b)=>a.id-b.id);

  for(const it of list){
    const div = document.createElement('div');
    const affordable = state.cookies >= it.cost;
    div.className = 'item' + (affordable ? ' affordable' : ' locked');
    // creative description for special items
    let desc = '';
    if(it.special && it.special.autoClickRatePerCount){
      desc = `Auto‑clicks: +${it.special.autoClickRatePerCount}/s per unit`;
    } else if(it.special && it.special.bonusPerCount){
      desc = `Passive bonus: +${it.special.bonusPerCount} CPS per unit`;
    } else {
      desc = `Generates ${it.cps} CPS each`;
    }
    // flair animation element
    const flairHtml = it.flair ? `<div style="position:absolute;right:10px;top:8px;color:rgba(255,255,255,0.06);font-size:12px">✦</div>` : '';
    div.innerHTML = `
      ${flairHtml}
      <div class="row"><div class="name">${it.name}</div><div class="count" data-id="${it.id}">x${it.count}</div></div>
      <div class="desc">${desc}</div>
      <div class="row"><div class="cost">CPS: ${it.cps}</div><div class="cost">Preis: ${fmtDisplay(it.cost)}</div></div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn buyBtn" data-id="${it.id}" ${affordable ? '' : 'disabled'}>Kaufen</button>
        <button class="btn" data-id="${it.id}" data-action="max" ${affordable ? '' : 'disabled'}>Max</button>
      </div>
    `;
    shop.appendChild(div);
  }
}

// update UI
function updateUI(){
  document.getElementById('totalDisplay').textContent = fmtDisplay(state.total);
  document.getElementById('cpsDisplay').textContent = state.cps.toFixed(2);
  document.getElementById('cookieDisplay').textContent = fmtDisplay(state.cookies);
  document.getElementById('perClick').textContent = state.perClick;
  document.getElementById('bonus').textContent = state.bonus;
  document.getElementById('ownedSummary').textContent = `Addons: ${state.items.reduce((s,i)=>s+i.count,0)}`;

  // update visible items and affordability classes
  document.querySelectorAll('#shop .item').forEach(el=>{
    const idAttr = el.querySelector('.count')?.dataset.id;
    if(!idAttr) return;
    const id = parseInt(idAttr);
    const it = state.items.find(x=>x.id===id);
    if(!it) return;
    el.querySelector('.count').textContent = `x${it.count}`;
    const costEls = el.querySelectorAll('.cost');
    if(costEls.length >= 2) costEls[1].textContent = `Preis: ${fmtDisplay(it.cost)}`;
    const affordable = state.cookies >= it.cost;
    if(affordable){
      el.classList.remove('locked');
      el.classList.add('affordable');
      el.querySelectorAll('button').forEach(b=>b.disabled = false);
    } else {
      el.classList.add('locked');
      el.classList.remove('affordable');
      el.querySelectorAll('button').forEach(b=>b.disabled = true);
    }
  });
}

// game logic
function recalcCPS(){
  // base cps from items
  let base = state.items.reduce((s,it)=>s + it.cps * it.count, 0);
  // apply special bonuses
  for(const it of state.items){
    if(it.special && it.special.bonusPerCount){
      base += it.count * it.special.bonusPerCount;
    }
  }
  state.cps = base + state.bonus;
}

// auto-click contribution (special item 1)
function autoClickContribution(dt){
  const it = state.items.find(x=>x.special && x.special.autoClickRatePerCount);
  if(!it) return 0;
  const rate = it.count * (it.special.autoClickRatePerCount || 0); // clicks per second
  return rate * state.perClick * dt; // cookies gained from auto-clicks
}

function tick(){
  const now = Date.now();
  const dt = (now - state.lastTick) / 1000;
  if(dt > 0){
    const gain = state.cps * dt;
    const autoClickGain = autoClickContribution(dt);
    state.cookies += gain + autoClickGain;
    state.total += gain + autoClickGain;
    state.lastTick = now;
  }
  updateUI();
  requestAnimationFrame(tick);
}

// click handling with immediate update and feedback
function doClick(){
  const gain = state.perClick;
  state.cookies += gain;
  state.total += gain;

  // button animation + floating text
  const bigBtn = document.getElementById('bigBtn');
  bigBtn.animate([{transform:'scale(1)'},{transform:'scale(1.08)'},{transform:'scale(1)'}],{duration:140,easing:'cubic-bezier(.2,.8,.2,1)'});

  const flash = document.createElement('div');
  flash.textContent = `+${gain}`;
  flash.style.position = 'absolute';
  flash.style.top = '18%';
  flash.style.left = '50%';
  flash.style.transform = 'translateX(-50%)';
  flash.style.color = '#fff';
  flash.style.fontWeight = '900';
  flash.style.pointerEvents = 'none';
  flash.style.textShadow = '0 2px 8px rgba(0,0,0,0.6)';
  flash.style.fontSize = '18px';
  bigBtn.appendChild(flash);
  flash.animate([{opacity:1, transform:'translateY(0)'},{opacity:0, transform:'translateY(-48px)'}],{duration:700}).onfinish = ()=> flash.remove();

  updateUI();
}

// buying
function buyItem(id, qty=1){
  const it = state.items.find(x=>x.id===id);
  if(!it) return;
  let bought = 0;
  for(let i=0;i<qty;i++){
    if(state.cookies >= it.cost){
      state.cookies -= it.cost;
      it.count++;
      it.cost = Math.ceil(it.baseCost * Math.pow(1.15, it.count));
      bought++;
    } else break;
  }
  if(bought>0){
    recalcCPS();
    // small count bump animation
    const countEl = document.querySelector(`#shop .count[data-id="${id}"]`);
    if(countEl){
      countEl.classList.remove('count-bump');
      void countEl.offsetWidth;
      countEl.classList.add('count-bump');
    }
    updateUI();
  }
}

function buyMax(id){
  const it = state.items.find(x=>x.id===id);
  if(!it) return;
  let bought = 0;
  while(state.cookies >= it.cost){
    state.cookies -= it.cost;
    it.count++;
    it.cost = Math.ceil(it.baseCost * Math.pow(1.15, it.count));
    bought++;
    if(bought > 100000) break;
  }
  if(bought>0){ recalcCPS(); updateUI(); }
}

function buyMaxAll(){
  const sorted = state.items.slice().sort((a,b)=>a.cost-b.cost);
  let totalBought = 0;
  for(const it of sorted){
    while(state.cookies >= it.cost){
      state.cookies -= it.cost;
      it.count++;
      it.cost = Math.ceil(it.baseCost * Math.pow(1.15, it.count));
      totalBought++;
      if(totalBought > 100000) break;
    }
  }
  if(totalBought>0){ recalcCPS(); updateUI(); }
}

// save/load/reset
function saveGame(){
  const data = {
    total: state.total,
    cookies: state.cookies,
    perClick: state.perClick,
    bonus: state.bonus,
    items: state.items.map(it=>({id:it.id,count:it.count,cost:it.cost}))
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(data));
}

function loadGame(){
  const raw = localStorage.getItem(SAVE_KEY);
  if(!raw) return;
  try{
    const data = JSON.parse(raw);
    state.total = data.total || 0;
    state.cookies = data.cookies || 0;
    state.perClick = data.perClick || 1;
    state.bonus = data.bonus || 0;
    for(const s of data.items || []){
      const it = state.items.find(x=>x.id===s.id);
      if(it){ it.count = s.count || 0; it.cost = s.cost || it.cost; }
    }
    recalcCPS();
    renderShop();
    updateUI();
  }catch(e){ /* ignore corrupt save */ }
}

function resetGame(){
  if(!confirm('Reset? Alle Fortschritte gehen verloren.')) return;
  state = { total:0, cookies:0, perClick:1, bonus:0, cps:0, items:[], lastTick:Date.now() };
  state.items = genShop();
  recalcCPS();
  renderShop();
  updateUI();
  localStorage.removeItem(SAVE_KEY);
}

// init & hooks
let currentSort = 'cost';
function init(){
  state.items = genShop();

  // try load
  const raw = localStorage.getItem(SAVE_KEY);
  if(raw){
    try{
      const parsed = JSON.parse(raw);
      state.total = parsed.total || 0;
      state.cookies = parsed.cookies || 0;
      state.perClick = parsed.perClick || 1;
      state.bonus = parsed.bonus || 0;
      for(const s of parsed.items || []){
        const it = state.items.find(x=>x.id===s.id);
        if(it){ it.count = s.count || 0; it.cost = s.cost || it.cost; }
      }
    }catch(e){ /* ignore */ }
  }

  recalcCPS();
  renderShop();
  updateUI();

  document.getElementById('bigBtn').addEventListener('click', doClick);
  document.getElementById('saveBtn').addEventListener('click', saveGame);
  document.getElementById('loadBtn').addEventListener('click', loadGame);
  document.getElementById('resetBtn').addEventListener('click', resetGame);
  document.getElementById('buyMaxBtn').addEventListener('click', buyMaxAll);

  document.getElementById('filter').addEventListener('input', (e)=> renderShop(e.target.value, currentSort));
  document.getElementById('sortBtn').addEventListener('click', ()=>{
    if(currentSort === 'cost') currentSort = 'cps';
    else if(currentSort === 'cps') currentSort = 'id';
    else currentSort = 'cost';
    document.getElementById('sortBtn').textContent = 'Sort: ' + (currentSort === 'cost' ? 'Preis' : currentSort === 'cps' ? 'CPS' : 'ID');
    renderShop(document.getElementById('filter').value, currentSort);
  });

  // delegated shop clicks
  document.getElementById('shop').addEventListener('click', (e)=>{
    const buy = e.target.closest('.buyBtn');
    if(buy){ buyItem(parseInt(buy.dataset.id)); return; }
    const max = e.target.closest('button[data-action="max"]');
    if(max){ buyMax(parseInt(max.dataset.id)); return; }
  });

  // keyboard shortcuts
  addEventListener('keydown', (e)=>{
    if(e.code === 'Space'){ e.preventDefault(); doClick(); }
    if(e.key.toLowerCase() === 'm') buyMaxAll();
    if(e.key.toLowerCase() === 's') saveGame();
    if(e.key.toLowerCase() === 'l') loadGame();
    if(e.key.toLowerCase() === 'r') resetGame();
  });

  state.lastTick = Date.now();
  requestAnimationFrame(tick);
  setInterval(saveGame, 10000);
}

// start
init();
</script>
</body>
</html>
