<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>ClickerX — Red Cookie (PerClick Upgrade)</title>
<style>
  :root{
    --bg:#041018;
    --panel:#0d1620;
    --muted:#9aa4b2;
    --accent:#ff3b3b;
    --accent-dark:#b82a2a;
    --glass:rgba(255,255,255,0.03);
    --gold:#ffd86b;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;background:
    radial-gradient(1200px 600px at 10% 10%, rgba(255,59,59,0.04), transparent),
    linear-gradient(180deg,#021018,#00060a);color:#eaf2ff;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1100px;margin:18px auto;padding:16px}
  header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  h1{margin:0;font-size:18px}
  .stats{display:flex;gap:10px;align-items:center}
  .stat{background:linear-gradient(180deg,var(--glass),transparent);padding:8px 12px;border-radius:10px;color:var(--muted);font-size:13px;border:1px solid rgba(255,255,255,0.02)}
  .big{font-size:22px;color:#fff;font-weight:800}
  .layout{display:grid;grid-template-columns:1fr;gap:12px}
  .panel{background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,0.03);box-shadow:0 8px 24px rgba(0,0,0,0.5)}
  #clickerArea{display:flex;flex-direction:column;align-items:center;gap:12px;touch-action:none}
  /* cookie button: outer ring + large inner cookie */
  #bigBtn{
    width:240px;height:240px;border-radius:50%;background:linear-gradient(180deg,#6b3b1a,#4a2a14);border:8px solid rgba(255,255,255,0.04);
    display:flex;align-items:center;justify-content:center;position:relative;overflow:visible;padding:0;cursor:pointer;
    box-shadow:0 18px 48px rgba(0,0,0,0.45);
    -webkit-user-select:none;user-select:none;touch-action:none;
  }
  /* inner cookie (the big cookie inside) */
  #bigBtn .innerCookie{
    width:200px;height:200px;border-radius:50%;background:
      radial-gradient(circle at 30% 30%, #fff0d0 0%, #ffd08a 40%, #d18b3a 100%);
    box-shadow: inset 0 -10px 24px rgba(0,0,0,0.12), 0 10px 30px rgba(0,0,0,0.35);
    position:relative;display:flex;align-items:center;justify-content:center;font-size:44px;color:#6b3b1a;
    transition:transform .08s ease;
  }
  /* chocolate chips on inner cookie */
  #bigBtn .chip{position:absolute;width:18px;height:12px;border-radius:3px;background:#6b3b1a;box-shadow:inset 0 -2px 0 rgba(0,0,0,0.2)}
  #bigBtn .c1{left:22%;top:26%;transform:rotate(-12deg)}
  #bigBtn .c2{left:56%;top:20%;transform:rotate(18deg)}
  #bigBtn .c3{left:38%;top:54%;transform:rotate(-6deg)}
  #bigBtn .c4{left:68%;top:50%;transform:rotate(10deg)}
  /* small click ripple */
  .ripple{
    position:absolute;border-radius:50%;pointer-events:none;background:rgba(255,255,255,0.12);
    transform:scale(0);opacity:0.9;
  }
  .mini{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .controls{display:flex;gap:8px;flex-wrap:wrap}
  .btn{background:var(--glass);border:1px solid rgba(255,255,255,0.03);padding:8px 10px;border-radius:8px;color:var(--muted);cursor:pointer}
  .btn.primary{background:linear-gradient(90deg,var(--accent),var(--accent-dark));color:#fff;font-weight:700}
  .shop{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;max-height:48vh;overflow:auto;padding-right:6px}
  .item{position:relative;background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.03);display:flex;flex-direction:column;gap:6px;transition:transform .12s, box-shadow .12s, opacity .12s}
  .item.locked{opacity:0.45;filter:grayscale(60%);background:linear-gradient(180deg,rgba(0,0,0,0.02),transparent);border-color:rgba(255,255,255,0.01)}
  .item.affordable{box-shadow:0 10px 30px rgba(124,255,124,0.06);border-color:rgba(124,255,124,0.06)}
  .row{display:flex;justify-content:space-between;align-items:center}
  .name{font-weight:800;color:#fff;font-size:14px}
  .desc{color:var(--muted);font-size:12px}
  .cost{color:var(--muted);font-size:13px}
  .count{color:var(--accent);font-weight:800}
  .count-bump{animation:bump .36s ease}
  @keyframes bump{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
  /* per-item small animations */
  .anim-gear .anim-el{width:22px;height:22px;border-radius:4px;background:linear-gradient(180deg,#cfcfcf,#9b9b9b);margin-left:auto;animation:spin 3s linear infinite}
  @keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
  .anim-flame .anim-el{width:22px;height:22px;margin-left:auto;background:linear-gradient(180deg,#ffb86b,#ff6b3b);border-radius:6px;animation:flame 1.2s infinite}
  @keyframes flame{0%{transform:translateY(0) scaleY(1)}50%{transform:translateY(-6px) scaleY(1.08)}100%{transform:translateY(0) scaleY(1)}}
  .anim-orb .anim-el{width:22px;height:22px;margin-left:auto;border-radius:50%;background:radial-gradient(circle,#9be6ff,#3b9cff);box-shadow:0 6px 18px rgba(59,156,255,0.12);animation:orb 2.4s infinite}
  @keyframes orb{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
  .anim-spark .anim-el{width:22px;height:22px;margin-left:auto;background:linear-gradient(90deg,#fff,#ffd86b);border-radius:6px;animation:spark 1.6s infinite}
  @keyframes spark{0%{transform:translateY(0) rotate(0)}50%{transform:translateY(-6px) rotate(12deg)}100%{transform:translateY(0) rotate(0)}}
  /* golden cookie */
  .golden{position:fixed;left:50%;transform:translateX(-50%);top:-120px;width:64px;height:64px;border-radius:12px;background:linear-gradient(180deg,#fff0b8,#ffd86b);box-shadow:0 12px 30px rgba(255,200,80,0.25);display:flex;align-items:center;justify-content:center;font-weight:800;color:#6b3b00;cursor:pointer;z-index:9999;animation:fall 6s linear forwards;touch-action:none}
  @keyframes fall{0%{top:-160px;opacity:0}10%{opacity:1}90%{top:110vh;opacity:1}100%{top:110vh;opacity:0}}
  .golden .shine{position:absolute;inset:0;border-radius:12px;box-shadow:inset 0 10px 30px rgba(255,255,255,0.25);opacity:0.6}
  .mult-banner{position:fixed;left:50%;transform:translateX(-50%);top:12px;background:linear-gradient(90deg,#ffd86b,#ffb86b);padding:8px 14px;border-radius:10px;color:#3b1a00;font-weight:800;box-shadow:0 8px 30px rgba(0,0,0,0.4);z-index:10000;display:none}
  .mult-active{display:block}
  .small-muted{font-size:13px;color:var(--muted)}
  footer{margin-top:12px;text-align:center;color:var(--muted);font-size:13px}
  @media (min-width:900px){ .layout{grid-template-columns:420px 1fr} .shop{max-height:72vh} }
  @media (max-width:420px){ #bigBtn{width:180px;height:180px} #bigBtn .innerCookie{width:160px;height:160px} .golden{width:56px;height:56px} }
</style>
</head>
<body>
  <div class="wrap" id="wrap">
    <header>
      <h1>ClickerX — Red Cookie</h1>
      <div class="stats">
        <div class="stat">Gesamt: <div id="totalDisplay" class="big">0.00</div></div>
        <div class="stat">CPS: <div id="cpsDisplay" class="big">0.00</div></div>
      </div>
    </header>

    <div class="layout">
      <div class="panel" id="clickerPanel">
        <div id="clickerArea">
          <button id="bigBtn" aria-label="Großer Cookie" type="button">
            <!-- outer ring is the button; innerCookie is the big cookie inside -->
            <div class="innerCookie" aria-hidden="true">
              <span style="font-size:48px">🍪</span>
              <div class="chip c1"></div><div class="chip c2"></div><div class="chip c3"></div><div class="chip c4"></div>
            </div>
          </button>

          <div class="mini" style="width:100%;justify-content:space-between">
            <div class="stat">Cookies: <div id="cookieDisplay" class="big">0.00</div></div>
            <div style="display:flex;flex-direction:column;align-items:flex-end">
              <div class="small-muted">Pro Klick: <strong id="perClick">1.00</strong></div>
              <div class="small-muted">Bonus CPS: <strong id="bonus">0</strong></div>
            </div>
          </div>

          <div class="controls" style="width:100%;justify-content:space-between">
            <div style="display:flex;gap:8px">
              <button class="btn" id="saveBtn">Speichern</button>
              <button class="btn" id="loadBtn">Laden</button>
              
            </div>
            <div>
              <button class="btn primary" id="buyMaxBtn">Buy Max</button>
            </div>
          </div>

          <div style="width:100%;margin-top:8px">
            <div class="small-muted">Goldene Kekse regnen jede Minute. Klick sie für einen zufälligen Cookie‑Multiplikator (1–100) für 20s.</div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="display:flex;gap:8px;align-items:center">
            <div class="small-muted">Shop</div>
            <div class="small-muted" id="ownedSummary"></div>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <input id="filter" type="search" placeholder="Suche Addon (Name oder #)" style="padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.03);background:transparent;color:#fff" />
            <button class="btn" id="sortBtn">Sort: Preis</button>
          </div>
        </div>

        <div id="shop" class="shop" aria-live="polite"></div>
      </div>
    </div>

    <footer>
      <div class="small-muted">Hotkeys: Leertaste = Klick, M = Buy Max, S = Save, L = Load, R = Reset</div>
    </footer>
  </div>

  <div id="multBanner" class="mult-banner">x<span id="multVal">1</span> Cookie‑Boost aktiv!</div>

<script>
/* Mobile-ready ClickerX with PerClick upgrades and big inner cookie visual.
   - First addon now increases cookies per click by +0.01 per unit
   - Items can increase CPS or PerClick (special.perClickPerCount)
   - pointerdown used for mobile responsiveness
*/

const SAVE_KEY = 'clickerx_mobile_perclick_v2';
const SHOP_COUNT = 100;
let state = {
  total: 0,
  cookies: 0,
  basePerClick: 1,    // base per click (sum of perClick upgrades)
  bonus: 0,
  cps: 0,
  items: [],
  lastTick: Date.now()
};

// golden multiplier state
let goldenActive = false;
let goldenMultiplier = 1;
let goldenTimeout = null;

// floating text pool limit
const MAX_FLOATS = 6;
let activeFloats = 0;

// formatting helpers
function fmtShort(n){
  if(n >= 1e12) return (n/1e12).toFixed(2)+'T';
  if(n >= 1e9) return (n/1e9).toFixed(2)+'B';
  if(n >= 1e6) return (n/1e6).toFixed(2)+'M';
  if(n >= 1e3) return (n/1e3).toFixed(2)+'k';
  return Math.floor(n).toString();
}
function fmtDisplay(n){
  if(n < 1000) return Number(n).toFixed(2);
  return fmtShort(n);
}

// creative names (first item renamed to reflect perClick upgrade)
const CREATIVE_NAMES = [
  "Click Booster","Cookie Drone","Sugar Synthesizer","Quantum Oven","Dragon's Breath",
  "Neon Mixer","Pixel Baker","Time‑Warp Kettle","Lucky Spoon","Grandma's Secret",
  "Factory Bot","Holo‑Advertiser","Cloud Mixer","Magnet Glove","Turbo Whisk",
  "Orbital Oven","Echo Harvester","Flux Conveyor","Crystal Jar","Starlight Press",
  "Pocket Blackhole","Candy Forge","Dream Mill","Aurora Tray","Zen Garden"
];

// generate shop with perClick for first addon
function genShop(){
  const items = [];
  for(let i=1;i<=SHOP_COUNT;i++){
    const name = CREATIVE_NAMES[i-1] || `Addon #${i}`;
    const base = Math.max(5, Math.round(Math.pow(1.17, i) * (8 + i*4)));
    const cps = parseFloat((Math.pow(1.07, i) * (0.05 + i*0.04)).toFixed(3));
    const special = {};
    // item 1: perClick upgrade +0.01 per unit
    if(i === 1) special.perClickPerCount = 0.01;
    // some items increase perClick (every 5th item) — keep additional perClick upgrades
    if(i % 5 === 0 && i !== 1){
      special.perClickPerCount = parseFloat((0.2 * (1 + i/50)).toFixed(3));
    }
    // some items give tiny bonus CPS
    if(i === 5) special.bonusPerCount = 0.02;
    // some items provide auto-click (kept for variety at item 2)
    if(i === 2) special.autoClickRatePerCount = 0.25; // smaller auto-click on item 2
    let anim = 'anim-spark';
    if(i % 7 === 0) anim = 'anim-gear';
    if(i % 5 === 0) anim = 'anim-flame';
    if(i % 3 === 0) anim = 'anim-orb';
    const flair = (i % 6 === 0);
    items.push({ id:i, name, baseCost: base, cost: base, cps, count:0, special, anim, flair });
  }
  return items;
}

// render shop
function renderShop(filter='', sortBy='cost'){
  const shop = document.getElementById('shop');
  shop.innerHTML = '';
  let list = state.items.slice();

  if(filter){
    const f = filter.toLowerCase();
    list = list.filter(it => it.name.toLowerCase().includes(f) || String(it.id).includes(f));
  }

  if(sortBy === 'cost') list.sort((a,b)=>a.cost-b.cost);
  if(sortBy === 'cps') list.sort((a,b)=>b.cps-a.cps);
  if(sortBy === 'id') list.sort((a,b)=>a.id-b.id);

  for(const it of list){
    const div = document.createElement('div');
    const affordable = state.cookies >= it.cost;
    div.className = 'item ' + (affordable ? 'affordable' : 'locked');
    let desc = '';
    if(it.special && it.special.perClickPerCount){
      desc = `Pro Klick: +${it.special.perClickPerCount} pro Einheit`;
    } else if(it.special && it.special.autoClickRatePerCount){
      desc = `Auto‑clicks: +${it.special.autoClickRatePerCount}/s per Einheit`;
    } else if(it.special && it.special.bonusPerCount){
      desc = `Passive bonus: +${it.special.bonusPerCount} CPS per Einheit`;
    } else {
      desc = `Generates ${it.cps} CPS each`;
    }
    const animHtml = `<div class="anim-el" aria-hidden="true"></div>`;
    const flairHtml = it.flair ? `<div style="position:absolute;right:10px;top:8px;color:rgba(255,255,255,0.06);font-size:12px">✦</div>` : '';
    div.innerHTML = `
      ${flairHtml}
      <div class="row"><div class="name">${it.name}</div><div class="count" data-id="${it.id}">x${it.count}</div></div>
      <div class="desc">${desc}</div>
      <div class="row"><div class="cost">CPS: ${it.cps}</div><div class="cost">Preis: ${fmtDisplay(it.cost)}</div></div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn buyBtn" data-id="${it.id}" ${affordable ? '' : 'disabled'}>Kaufen</button>
        <button class="btn" data-id="${it.id}" data-action="max" ${affordable ? '' : 'disabled'}>Max</button>
      </div>
      ${animHtml}
    `;
    div.classList.add(it.anim);
    shop.appendChild(div);
  }
}

// update UI
function updateUI(){
  document.getElementById('totalDisplay').textContent = fmtDisplay(state.total);
  document.getElementById('cpsDisplay').textContent = state.cps.toFixed(2);
  document.getElementById('cookieDisplay').textContent = fmtDisplay(state.cookies);
  const effectivePerClick = computeBasePerClick() * goldenMultiplier;
  document.getElementById('perClick').textContent = effectivePerClick.toFixed(2);
  document.getElementById('bonus').textContent = state.bonus;
  document.getElementById('ownedSummary').textContent = `Addons: ${state.items.reduce((s,i)=>s+i.count,0)}`;

  document.querySelectorAll('#shop .item').forEach(el=>{
    const countEl = el.querySelector('.count');
    if(!countEl) return;
    const id = parseInt(countEl.dataset.id);
    const it = state.items.find(x=>x.id===id);
    if(!it) return;
    countEl.textContent = `x${it.count}`;
    const costEls = el.querySelectorAll('.cost');
    if(costEls.length >= 2) costEls[1].textContent = `Preis: ${fmtDisplay(it.cost)}`;
    const affordable = state.cookies >= it.cost;
    if(affordable){
      el.classList.remove('locked');
      el.classList.add('affordable');
      el.querySelectorAll('button').forEach(b=>b.disabled = false);
    } else {
      el.classList.add('locked');
      el.classList.remove('affordable');
      el.querySelectorAll('button').forEach(b=>b.disabled = true);
    }
  });
}

// compute base perClick from perClick upgrades
function computeBasePerClick(){
  let base = state.basePerClick || 1;
  for(const it of state.items){
    if(it.special && it.special.perClickPerCount){
      base += it.count * it.special.perClickPerCount;
    }
  }
  return base;
}

// recalc cps
function recalcCPS(){
  let base = state.items.reduce((s,it)=>s + it.cps * it.count, 0);
  for(const it of state.items){
    if(it.special && it.special.bonusPerCount){
      base += it.count * it.special.bonusPerCount;
    }
  }
  state.cps = base + state.bonus;
}

// auto-click contribution
function autoClickContribution(dt){
  const it = state.items.find(x=>x.special && x.special.autoClickRatePerCount);
  if(!it) return 0;
  const rate = it.count * (it.special.autoClickRatePerCount || 0); // clicks/sec
  return rate * computeBasePerClick() * goldenMultiplier * dt;
}

// tick loop
function tick(){
  const now = Date.now();
  const dt = (now - state.lastTick) / 1000;
  if(dt > 0){
    const gain = state.cps * dt;
    const autoClickGain = autoClickContribution(dt);
    state.cookies += gain + autoClickGain;
    state.total += gain + autoClickGain;
    state.lastTick = now;
  }
  updateUI();
  requestAnimationFrame(tick);
}

// floating text (limited)
function showFloat(text, parent){
  if(activeFloats >= MAX_FLOATS) return;
  activeFloats++;
  const el = document.createElement('div');
  el.textContent = text;
  el.style.position = 'absolute';
  el.style.left = '50%';
  el.style.top = '12%';
  el.style.transform = 'translateX(-50%)';
  el.style.color = '#6b3b1a';
  el.style.fontWeight = '900';
  el.style.pointerEvents = 'none';
  el.style.textShadow = '0 2px 8px rgba(0,0,0,0.6)';
  el.style.fontSize = '16px';
  parent.appendChild(el);
  el.animate([{opacity:1, transform:'translateY(0)'},{opacity:0, transform:'translateY(-48px)'}],{duration:700}).onfinish = ()=>{
    el.remove();
    activeFloats--;
  };
}

// click handling (pointerdown)
function doClick(){
  const gain = computeBasePerClick() * goldenMultiplier;
  state.cookies += gain;
  state.total += gain;
  const bigBtnInner = document.querySelector('#bigBtn .innerCookie');
  bigBtnInner.animate([{transform:'scale(1)'},{transform:'scale(1.06)'},{transform:'scale(1)'}],{duration:140,easing:'cubic-bezier(.2,.8,.2,1)'});
  showFloat('+' + Number(gain).toFixed(2), document.getElementById('bigBtn'));
  updateUI();
}

// buy logic
function buyItem(id, qty=1){
  const it = state.items.find(x=>x.id===id);
  if(!it) return;
  let bought = 0;
  for(let i=0;i<qty;i++){
    if(state.cookies >= it.cost){
      state.cookies -= it.cost;
      it.count++;
      it.cost = Math.ceil(it.baseCost * Math.pow(1.15, it.count));
      bought++;
    } else break;
  }
  if(bought>0){
    recalcCPS();
    const countEl = document.querySelector(`#shop .count[data-id="${id}"]`);
    if(countEl){
      countEl.classList.remove('count-bump');
      void countEl.offsetWidth;
      countEl.classList.add('count-bump');
    }
    updateUI();
  }
}

function buyMax(id){
  const it = state.items.find(x=>x.id===id);
  if(!it) return;
  let bought = 0;
  while(state.cookies >= it.cost){
    state.cookies -= it.cost;
    it.count++;
    it.cost = Math.ceil(it.baseCost * Math.pow(1.15, it.count));
    bought++;
    if(bought > 100000) break;
  }
  if(bought>0){ recalcCPS(); updateUI(); }
}

function buyMaxAll(){
  const sorted = state.items.slice().sort((a,b)=>a.cost-b.cost);
  let totalBought = 0;
  for(const it of sorted){
    while(state.cookies >= it.cost){
      state.cookies -= it.cost;
      it.count++;
      it.cost = Math.ceil(it.baseCost * Math.pow(1.15, it.count));
      totalBought++;
      if(totalBought > 100000) break;
    }
  }
  if(totalBought>0){ recalcCPS(); updateUI(); }
}

// golden cookie spawn
function spawnGolden(){
  const el = document.createElement('div');
  el.className = 'golden';
  el.innerHTML = `<div class="shine"></div>🍪`;
  document.body.appendChild(el);
  setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); }, 6200);
  el.addEventListener('pointerdown', (e)=>{
    e.preventDefault();
    const mult = Math.floor(Math.random()*100) + 1;
    activateGolden(mult);
    el.style.transform = 'translateX(-50%) scale(1.2)';
    el.style.opacity = '0';
    setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); }, 300);
  }, {passive:false});
}

// activate golden multiplier
function activateGolden(mult){
  if(goldenTimeout) clearTimeout(goldenTimeout);
  goldenActive = true;
  goldenMultiplier = mult;
  document.getElementById('multVal').textContent = mult;
  document.getElementById('multBanner').classList.add('mult-active');
  showFloat('Golden x' + mult + '!', document.getElementById('wrap'));
  goldenTimeout = setTimeout(()=>{ deactivateGolden(); }, 20000);
  updateUI();
}

// deactivate golden
function deactivateGolden(){
  goldenActive = false;
  goldenMultiplier = 1;
  document.getElementById('multBanner').classList.remove('mult-active');
  goldenTimeout = null;
  updateUI();
}

// save/load/reset
function saveGame(){
  const data = {
    total: state.total,
    cookies: state.cookies,
    basePerClick: state.basePerClick,
    bonus: state.bonus,
    items: state.items.map(it=>({id:it.id,count:it.count,cost:it.cost}))
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  showFloat('Gespeichert', document.getElementById('wrap'));
}

function loadGame(){
  const raw = localStorage.getItem(SAVE_KEY);
  if(!raw) return;
  try{
    const data = JSON.parse(raw);
    state.total = data.total || 0;
    state.cookies = data.cookies || 0;
    state.basePerClick = data.basePerClick || 1;
    state.bonus = data.bonus || 0;
    for(const s of data.items || []){
      const it = state.items.find(x=>x.id===s.id);
      if(it){ it.count = s.count || 0; it.cost = s.cost || it.cost; }
    }
    recalcCPS();
    renderShop();
    updateUI();
    showFloat('Geladen', document.getElementById('wrap'));
  }catch(e){ /* ignore corrupt save */ }
}

function resetGame(){
  if(!confirm('Reset? Alle Fortschritte gehen verloren.')) return;
  state = { total:0, cookies:0, basePerClick:1, bonus:0, cps:0, items:[], lastTick:Date.now() };
  state.items = genShop();
  recalcCPS();
  renderShop();
  updateUI();
  localStorage.removeItem(SAVE_KEY);
  showFloat('Zurückgesetzt', document.getElementById('wrap'));
}

// init & hooks
let currentSort = 'cost';
function init(){
  state.items = genShop();

  // try load
  const raw = localStorage.getItem(SAVE_KEY);
  if(raw){
    try{
      const parsed = JSON.parse(raw);
      state.total = parsed.total || 0;
      state.cookies = parsed.cookies || 0;
      state.basePerClick = parsed.basePerClick || 1;
      state.bonus = parsed.bonus || 0;
      for(const s of parsed.items || []){
        const it = state.items.find(x=>x.id===s.id);
        if(it){ it.count = s.count || 0; it.cost = s.cost || it.cost; }
      }
    }catch(e){ /* ignore */ }
  }

  recalcCPS();
  renderShop();
  updateUI();

  const bigBtn = document.getElementById('bigBtn');
  bigBtn.addEventListener('pointerdown', (e)=>{ e.preventDefault(); doClick(); }, {passive:false});
  bigBtn.addEventListener('keydown', (e)=>{ if(e.key === 'Enter' || e.key === ' ') doClick(); });

  document.getElementById('saveBtn').addEventListener('pointerdown', (e)=>{ e.preventDefault(); saveGame(); }, {passive:false});
  document.getElementById('loadBtn').addEventListener('pointerdown', (e)=>{ e.preventDefault(); loadGame(); }, {passive:false});
  
  document.getElementById('buyMaxBtn').addEventListener('pointerdown', (e)=>{ e.preventDefault(); buyMaxAll(); }, {passive:false});

  document.getElementById('filter').addEventListener('input', (e)=> renderShop(e.target.value, currentSort));
  document.getElementById('sortBtn').addEventListener('pointerdown', (e)=>{
    e.preventDefault();
    if(currentSort === 'cost') currentSort = 'cps';
    else if(currentSort === 'cps') currentSort = 'id';
    else currentSort = 'cost';
    document.getElementById('sortBtn').textContent = 'Sort: ' + (currentSort === 'cost' ? 'Preis' : currentSort === 'cps' ? 'CPS' : 'ID');
    renderShop(document.getElementById('filter').value, currentSort);
  }, {passive:false});

  // delegated shop clicks (pointer)
  document.getElementById('shop').addEventListener('pointerdown', (e)=>{
    const buy = e.target.closest('.buyBtn');
    if(buy){ e.preventDefault(); buyItem(parseInt(buy.dataset.id)); recalcCPS(); return; }
    const max = e.target.closest('button[data-action="max"]');
    if(max){ e.preventDefault(); buyMax(parseInt(max.dataset.id)); recalcCPS(); return; }
  }, {passive:false});

  // keyboard shortcuts
  addEventListener('keydown', (e)=>{
    if(e.code === 'Space'){ e.preventDefault(); doClick(); }
    if(e.key.toLowerCase() === 'm') buyMaxAll();
    if(e.key.toLowerCase() === 's') saveGame();
    if(e.key.toLowerCase() === 'l') loadGame();
    if(e.key.toLowerCase() === 'r') resetGame();
  });

  state.lastTick = Date.now();
  requestAnimationFrame(tick);
  setInterval(saveGame, 10000);

  // golden cookie every 60s, first after 10s
  setTimeout(()=>{ spawnGolden(); setInterval(spawnGolden, 60000); }, 10000);
}

// start
init();
</script>
</body>
</html>
