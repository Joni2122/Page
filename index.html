<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ClickerX — Red Button Edition</title>
  <style>
    :root{
      --bg:#0b0f14;
      --panel:#0f1720;
      --muted:#9aa4b2;
      --accent:#ff3b3b;
      --accent-dark:#b82a2a;
      --glass: rgba(255,255,255,0.03);
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;background:linear-gradient(180deg,#07101a,#05060a);color:#eaf2ff}
    .wrap{max-width:1100px;margin:28px auto;padding:18px}
    header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
    h1{margin:0;font-size:20px;letter-spacing:0.6px}
    .stats{display:flex;gap:12px;align-items:center}
    .stat{background:var(--panel);padding:10px 14px;border-radius:10px;color:var(--muted);font-size:13px}
    .big{font-size:26px;color:#fff;font-weight:800}
    .layout{display:grid;grid-template-columns:380px 1fr;gap:16px}
    .panel{background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent);padding:14px;border-radius:12px;border:1px solid rgba(255,255,255,0.03);box-shadow:0 8px 24px rgba(0,0,0,0.5)}
    #clickerArea{display:flex;flex-direction:column;align-items:center;gap:12px}
    /* Red big button */
    #bigBtn{
      width:280px;height:280px;border-radius:50%;background:radial-gradient(circle at 30% 30%, #ff6b6b, var(--accent));border:6px solid rgba(255,255,255,0.06);
      color:#fff;font-size:28px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;
      box-shadow:0 18px 40px rgba(255,59,59,0.18), inset 0 -8px 24px rgba(0,0,0,0.25);
      transition:transform .08s ease, box-shadow .08s ease;
      position:relative;overflow:hidden;
    }
    #bigBtn:active{transform:scale(0.98);box-shadow:0 8px 20px rgba(0,0,0,0.35)}
    /* pulse ring */
    #bigBtn::after{
      content:"";position:absolute;inset:-6px;border-radius:50%;box-shadow:0 0 0 0 rgba(255,59,59,0.25);animation:pulse 2.2s infinite;
    }
    @keyframes pulse{
      0%{box-shadow:0 0 0 0 rgba(255,59,59,0.18)}
      70%{box-shadow:0 0 0 28px rgba(255,59,59,0)}
      100%{box-shadow:0 0 0 0 rgba(255,59,59,0)}
    }
    .mini{display:flex;gap:12px;align-items:center}
    .controls{display:flex;gap:8px;flex-wrap:wrap}
    .btn{background:var(--glass);border:1px solid rgba(255,255,255,0.03);padding:8px 10px;border-radius:8px;color:var(--muted);cursor:pointer}
    .btn.primary{background:linear-gradient(90deg,var(--accent),var(--accent-dark));color:#fff;font-weight:700}
    .shop{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;max-height:64vh;overflow:auto;padding-right:6px}
    .item{background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.03);display:flex;flex-direction:column;gap:8px}
    .row{display:flex;justify-content:space-between;align-items:center}
    .name{font-weight:700}
    .cost{color:var(--muted);font-size:13px}
    .count{color:var(--accent);font-weight:800}
    .log{height:120px;overflow:auto;background:rgba(0,0,0,0.2);padding:8px;border-radius:8px;color:var(--muted);font-size:13px}
    .search{display:flex;gap:8px;margin-bottom:10px}
    input[type="search"]{flex:1;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.03);background:transparent;color:#fff}
    footer{margin-top:18px;text-align:center;color:var(--muted);font-size:13px}
    @media (max-width:900px){ .layout{grid-template-columns:1fr} #bigBtn{width:220px;height:220px} .shop{max-height:40vh} }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>ClickerX — Red Button Edition</h1>
      <div class="stats">
        <div class="stat">Gesamt: <div id="totalDisplay" class="big">0</div></div>
        <div class="stat">CPS: <div id="cpsDisplay" class="big">0</div></div>
      </div>
    </header>

    <div class="layout">
      <div class="panel" id="clickerPanel">
        <div id="clickerArea">
          <button id="bigBtn" aria-label="Großer roter Klickknopf">KLICK</button>
          <div class="mini">
            <div class="stat">Cookies: <div id="cookieDisplay" class="big">0</div></div>
            <div style="display:flex;flex-direction:column;align-items:flex-start">
              <div class="small">Pro Klick: <strong id="perClick">1</strong></div>
              <div class="small">Bonus CPS: <strong id="bonus">0</strong></div>
            </div>
          </div>

          <div class="controls">
            <button class="btn" id="saveBtn">Speichern</button>
            <button class="btn" id="loadBtn">Laden</button>
            <button class="btn" id="resetBtn">Reset</button>
            <button class="btn primary" id="buyMaxBtn">Buy Max</button>
          </div>

          <div style="width:100%;margin-top:8px">
            <div class="small">Log</div>
            <div id="log" class="log"></div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="display:flex;gap:8px;align-items:center">
            <div class="small">Shop</div>
            <div class="small" id="ownedSummary"></div>
          </div>
          <div class="search">
            <input id="filter" type="search" placeholder="Suche Addon (Name oder #)" />
            <button class="btn" id="sortBtn">Sort: Preis</button>
          </div>
        </div>

        <div id="shop" class="shop"></div>
      </div>
    </div>

    <footer>
      <div class="small">Hotkeys: Leertaste = Klick, M = Buy Max, S = Save, L = Load, R = Reset</div>
    </footer>
  </div>

  <script src="game.js"></script>
</body>
</html>
